name: Build & Release Site

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The release version of the site, such as v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build HTML artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Astro/Starlight dependencies
        run: npm ci

      - name: Verify Astro toolchain
        run: |
          npx astro --version
          npm ls astro @astrojs/starlight sharp

      - name: Build site
        run: npm run build

      - name: Package HTML artifact
        run: |
          mv dist Skills-Test-Specification
          tar czf Skills-Test-Specification.tar.gz Skills-Test-Specification

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Skills-Test-Specification-html
          path: Skills-Test-Specification.tar.gz
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Build for ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: Skills-Test-Specification.tar.gz

  trigger:
    needs: build
    name: Trigger wangwei1237.github.io_src deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger wangwei1237.github.io_src deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.TOKEN || secrets.GH_ACCESS_TOKEN }}
          TARGET_REPOSITORY: wangwei1237/wangwei1237.github.io_src
          TARGET_PATH: Skills-Test-Specification
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::Missing dispatch token. Configure repository secret TOKEN or GH_ACCESS_TOKEN with permission to dispatch workflows in ${TARGET_REPOSITORY}."
            exit 1
          fi

          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${TARGET_REPOSITORY}/dispatches" \
            -d '{"event_type":"update","client_payload":{"from":"${{ github.repository }}","version":"${{ github.event.inputs.version }}","path":"'"${TARGET_PATH}"'","msg":"${{ github.workflow }} release"}}'
