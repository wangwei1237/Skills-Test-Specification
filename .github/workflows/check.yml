name: Check Site

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    name: Build Starlight site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Astro/Starlight dependencies
        run: npm ci

      - name: Verify Astro toolchain
        run: |
          npx astro --version
          npm ls astro @astrojs/starlight sharp

      - name: Build site
        run: npm run build
